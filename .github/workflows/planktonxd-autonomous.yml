# PlanktonXD Autonomous Live Scanning System
# Continuous deployment & monitoring via GitHub Actions

name: PlanktonXD Live Scanner Deploy

on:
  push:
    branches: [main]
    paths: 
      - 'agents/planktonxd_**'
      - 'strategies/planktonxd_**'
      - '_scratch/planktonxd_**'
      - 'monitoring/planktonxd_**'
  schedule:
    # Health check every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - restart
          - health-check
          - scale-up
          - emergency-stop

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: resonanceenergy/aac-planktonxd
  DEPLOYMENT_TARGET: production

jobs:
  build-and-push:
    name: Build & Push Container
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.planktonxd
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  deploy-scanner:
    name: Deploy Live Scanner
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: always() && (needs.build-and-push.result == 'success' || github.event.inputs.action != 'deploy')
    
    steps:
      - name: Checkout deployment configs
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'
      
      - name: Configure cluster access
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config
      
      - name: Deploy to Kubernetes
        run: |
          # Deploy PlanktonXD scanner deployment
          envsubst < k8s/planktonxd-deployment.yml | kubectl apply -f -
          
          # Deploy monitoring & alerting
          envsubst < k8s/planktonxd-monitoring.yml | kubectl apply -f -
          
          # Deploy auto-scaler
          envsubst < k8s/planktonxd-autoscaler.yml | kubectl apply -f -
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-digest || 'latest' }}
          POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
          POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      
      - name: Wait for deployment
        run: |
          kubectl rollout status deployment/planktonxd-scanner --timeout=300s
          kubectl rollout status deployment/planktonxd-monitor --timeout=120s

  health-check:
    name: Health Check & Auto-Remediation
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'health-check' || github.event_name == 'schedule'
    
    steps:
      - name: Configure cluster access
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      
      - name: Check scanner health
        id: health
        run: |
          # Check if scanner pods are running
          SCANNER_PODS=$(kubectl get pods -l app=planktonxd-scanner --field-selector=status.phase=Running --no-headers | wc -l)
          
          # Check if API is responding
          SCANNER_IP=$(kubectl get service planktonxd-scanner -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${SCANNER_IP}:8091/health || echo "000")
          
          echo "scanner_pods=${SCANNER_PODS}" >> $GITHUB_OUTPUT
          echo "health_status=${HEALTH_STATUS}" >> $GITHUB_OUTPUT
          echo "scanner_ip=${SCANNER_IP}" >> $GITHUB_OUTPUT
          
          # Check scanning performance
          OPPORTUNITIES_COUNT=$(curl -s http://${SCANNER_IP}:8091/api/scan | jq '.opportunities | length' || echo "0")
          echo "opportunities_count=${OPPORTUNITIES_COUNT}" >> $GITHUB_OUTPUT
      
      - name: Auto-restart unhealthy pods
        if: steps.health.outputs.scanner_pods == '0' || steps.health.outputs.health_status != '200'
        run: |
          echo "⚠️ Scanner unhealthy - restarting..."
          kubectl rollout restart deployment/planktonxd-scanner
          kubectl rollout status deployment/planktonxd-scanner --timeout=300s
      
      - name: Scale up if no opportunities
        if: steps.health.outputs.opportunities_count == '0'
        run: |
          echo "⚠️ No opportunities found - may need scaling..."
          kubectl scale deployment planktonxd-scanner --replicas=3
      
      - name: Send Discord alert
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
               -d '{"content":"🚨 PlanktonXD Scanner Alert: Health check failed. Pods: ${{ steps.health.outputs.scanner_pods }}, Status: ${{ steps.health.outputs.health_status }}"}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  performance-monitoring:
    name: Performance & Opportunity Tracking
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.action == 'health-check'
    
    steps:
      - name: Configure cluster access
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      
      - name: Collect performance metrics
        id: metrics
        run: |
          SCANNER_IP=$(kubectl get service planktonxd-scanner -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          # Get current opportunities
          METRICS=$(curl -s http://${SCANNER_IP}:8091/api/scan)
          OPP_COUNT=$(echo $METRICS | jq '.opportunities | length')
          AVG_EDGE=$(echo $METRICS | jq '.opportunities | map(.edge) | add / length')
          TOP_EDGE=$(echo $METRICS | jq '.opportunities | map(.edge) | max')
          
          # Get account status
          ACCOUNT=$(curl -s http://${SCANNER_IP}:8091/api/account)
          BALANCE=$(echo $ACCOUNT | jq '.balance')
          DAILY_PNL=$(echo $ACCOUNT | jq '.daily_pnl')
          
          echo "opportunities=${OPP_COUNT}" >> $GITHUB_OUTPUT
          echo "avg_edge=${AVG_EDGE}" >> $GITHUB_OUTPUT  
          echo "top_edge=${TOP_EDGE}" >> $GITHUB_OUTPUT
          echo "balance=${BALANCE}" >> $GITHUB_OUTPUT
          echo "daily_pnl=${DAILY_PNL}" >> $GITHUB_OUTPUT
      
      - name: Performance alert
        if: steps.metrics.outputs.opportunities < 5
        run: |
          curl -H "Content-Type: application/json" \
               -d "{\"content\":\"📊 PlanktonXD Performance Alert:\n• Opportunities: ${{ steps.metrics.outputs.opportunities }}\n• Avg Edge: ${{ steps.metrics.outputs.avg_edge }}¢\n• Balance: ${{ steps.metrics.outputs.balance }}\n• Daily P&L: ${{ steps.metrics.outputs.daily_pnl }}\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  emergency-controls:
    name: Emergency Stop/Restart Controls
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'emergency-stop' || github.event.inputs.action == 'restart'
    
    steps:
      - name: Configure cluster access
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      
      - name: Emergency stop
        if: github.event.inputs.action == 'emergency-stop'
        run: |
          echo "🛑 EMERGENCY STOP initiated..."
          kubectl scale deployment planktonxd-scanner --replicas=0
          kubectl patch deployment planktonxd-scanner -p '{"spec":{"template":{"metadata":{"annotations":{"emergency.stop":"true"}}}}}'
          
          # Send emergency notification
          curl -H "Content-Type: application/json" \
               -d '{"content":"🛑 EMERGENCY STOP: PlanktonXD scanner has been shut down via GitHub Actions"}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
      
      - name: Restart scanner
        if: github.event.inputs.action == 'restart'
        run: |
          echo "🔄 Restarting PlanktonXD scanner..."
          kubectl rollout restart deployment/planktonxd-scanner
          kubectl scale deployment planktonxd-scanner --replicas=2
          kubectl rollout status deployment/planktonxd-scanner --timeout=300s
          
          # Verify restart
          sleep 30
          SCANNER_IP=$(kubectl get service planktonxd-scanner -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -f http://${SCANNER_IP}:8091/health
          
          curl -H "Content-Type: application/json" \
               -d '{"content":"✅ PlanktonXD scanner restarted successfully"}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

  cost-optimization:
    name: Auto-Scale Based on Market Hours
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Configure cluster access
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
      
      - name: Scale based on market activity
        run: |
          CURRENT_HOUR=$(date +%H)
          
          # Scale up during peak market hours (9-16 UTC = US market hours)
          if [ $CURRENT_HOUR -ge 9 ] && [ $CURRENT_HOUR -le 16 ]; then
            echo "Peak hours - scaling up to 3 replicas"
            kubectl scale deployment planktonxd-scanner --replicas=3
          else
            echo "Off-peak hours - scaling to 1 replica"  
            kubectl scale deployment planktonxd-scanner --replicas=1
          fi