services:
  aac:
    build: .
    container_name: aac-trading
    env_file: .env
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["paper"]

  redis:
    image: redis:7-alpine
    container_name: aac-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
