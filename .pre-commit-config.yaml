# .pre-commit-config.yaml — AAC pre-commit hooks (ruff-only Python toolchain)
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: debug-statements
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  # Ruff: lint + format (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # ── Single Launcher Rule ──────────────────────────────────────────────
  # Prevent duplicate launcher files from being committed.
  # See .github/SINGLE_LAUNCHER_RULE.md
  - repo: local
    hooks:
      - id: single-launcher-rule
        name: "Enforce single launcher (no duplicate launch files)"
        entry: python -c "import sys,pathlib;root=pathlib.Path('.');bad=[p for p in root.glob('*') if ('launch' in p.name.lower() or 'startup' in p.name.lower() or 'boot' in p.name.lower()) and p.name not in ('launch.py','launch.bat','launch.sh')];sys.exit(f'SINGLE LAUNCHER RULE VIOLATION — delete {[str(b) for b in bad]}  (see .github/SINGLE_LAUNCHER_RULE.md)') if bad else None"
        language: system
        always_run: true
        pass_filenames: false
