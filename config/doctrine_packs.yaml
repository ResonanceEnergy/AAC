        critical: '>75'
    - metric: margin_buffer
      thresholds:
        good: '>50'
        warning: 25-50
        critical: <25
    - metric: strategy_correlation_matrix
      thresholds:
        good: <0.5
        warning: 0.5-0.7
        critical: '>0.7'
    - metric: stressed_var_99
      thresholds:
        good: <3
        warning: 3-5
        critical: '>5'
    - metric: portfolio_heat
      thresholds:
        good: <50
        warning: 50-75
        critical: '>75'
    failure_modes:
    - cascading_liquidation
    - correlated_drawdown
    - leverage_trap
    barren_wuffet_triggers:
    - - drawdown_exceeds_5pct
      - CAUTION
      - A_THROTTLE_RISK
    - - drawdown_exceeds_10pct
      - SAFE_MODE
      - A_STOP_EXECUTION
    - - daily_loss_exceeds_2pct
