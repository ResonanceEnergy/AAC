    - margin_buffer
    - strategy_correlation_matrix
    - stressed_var_99
    - portfolio_heat
    required_metrics:
    - metric: max_drawdown_pct
      thresholds:
        good: <5
        warning: 5-10
        critical: '>10'
    - metric: daily_loss_pct
      thresholds:
        good: <1
        warning: 1-2
        critical: '>2'
    - metric: tail_loss_p99
      thresholds:
        good: <3
        warning: 3-5
        critical: '>5'
    - metric: capital_utilization
