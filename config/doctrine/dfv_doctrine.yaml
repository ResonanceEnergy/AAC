# DFV doctrine pack — Roaring Kitty operator
# Loaded by agents/dfv/decision_engine.py
# Edit thresholds here; persona prose lives in agents/dfv/persona.md.

version: 1.0
codename: DFV
operator: "Keith Patrick Gill (Roaring Kitty / DeepFuckingValue)"

# ── Autonomy switches ────────────────────────────────────────────
# DFV-AUTONOMY-LOCK: trade_execution MUST stay 'human_in_loop'.
# Flipping to 'full' requires:
#   1) explicit operator OK in a commit message tagged DFV-AUTONOMY-CHANGE
#   2) a passing dry-run report committed under reports/dfv/autonomy/
# decision_engine.review_prompt() enforces this at runtime — it will
# REJECT order placement when trade_execution != 'full' even if a caller
# tries to bypass the gates.
autonomy:
  research: full # screening, DD, thesis updates
  briefings: full # daily/weekly briefs, alerts
  watchlist: full # add/remove watchlist tickers
  conviction_tiers: full # nudge conviction on existing positions
  trade_execution: human_in_loop # DFV proposes, human signs.  flip to "full" only with explicit go-ahead.
  margin_changes: human_in_loop
  new_ticker: human_in_loop # any name not yet in active book

# ── Conviction tiers → max % of book ─────────────────────────────
conviction:
  "5":
    {
      label: "screaming",
      max_pct_book: 0.20,
      options_allowed: true,
      notes: "core; LEAPS welcome",
    }
  "4": { label: "high", max_pct_book: 0.10, options_allowed: true }
  "3":
    {
      label: "starter",
      max_pct_book: 0.03,
      options_allowed: false,
      notes: "must hold ≥ 5 days before scaling",
    }
  "2": { label: "watch", max_pct_book: 0.0, options_allowed: false }
  "1": { label: "lottery", max_pct_book: 0.0, options_allowed: false }

# ── Deep value screen thresholds ────────────────────────────────
screens:
  deep_value:
    pb_max: 1.0
    ev_ebitda_max: 6.0
    fcf_yield_min: 0.08
    net_cash_pct_mc_min: 0.25
    ncav_min: 0.0
  squeeze_setup:
    si_pct_min: 0.20
    days_to_cover_min: 5.0
    cost_to_borrow_min: 0.10
    float_max_m: 100
    ftd_trend: increasing
  insider_cluster:
    min_total_usd: 1_000_000
    window_days: 30
    insider_roles: ["CEO", "CFO", "COO", "Director", "President"]

# ── Decision filter (the seven gates) ────────────────────────────
gates:
  - id: G1
    name: thesis_present
    rule: "thesis_log.has(symbol)"
    on_fail: reject
    severity: hard
  - id: G2
    name: conviction_size_match
    rule: "size_pct <= conviction[ticker].max_pct_book"
    on_fail: resize_down
    severity: hard
  - id: G3
    name: dry_powder_preserved
    rule: "cash_after_trade >= portfolio_value * 0.10"
    on_fail: scale_down_or_reject
    severity: soft
  - id: G4
    name: catalyst_window
    rule: "no_catalyst_within(days=5) OR catalyst_acknowledged"
    on_fail: flag
    severity: soft
  - id: G5
    name: correlation_cluster
    rule: "factor_concentration_after <= 0.40"
    on_fail: flag
    severity: soft
  - id: G6
    name: invalidation_defined
    rule: "thesis.invalidation is not None"
    on_fail: reject
    severity: hard
  - id: G7
    name: liquidity_ok
    rule: "expected_slippage_pct < 0.01"
    on_fail: reduce_size
    severity: soft
  - id: G8
    name: vol_regime_ok
    rule: "long-vega entries blocked when VIX < vix_floor AND term-structure in contango"
    on_fail: reject
    severity: soft

# G8 — vol-regime thresholds. Long-vol bets need a friendly regime.
vol_regime:
  enabled: true
  vix_floor: 15.0 # below this, buying vol is renting theta
  contango_threshold: 0.0 # VIX3M - VIX > 0 = contango = unfriendly for long vol
  applies_to_actions: ["buy_put", "buy_call", "long_vol", "buy"] # entry-side only

# Roll-trigger doctrine — long options must declare a roll-or-kill DTE.
roll_policy:
  default_trigger_dte: 21 # postmortem lesson: theta beats realized vol below this
  alert_lane_dte: 21 # surface in brief() when any position crosses this

decision_policy:
  hard_fail_count_to_veto: 1 # any hard fail vetoes
  soft_fail_count_to_veto: 3
  soft_fail_count_to_warn: 1

# ── Daily cadence (ET) — daemon schedules ────────────────────────
cadence:
  asia_digest: "04:00"
  pre_market: "07:30"
  open_bell_prep: "09:25"
  midday: "12:00"
  drift_monitor: "12:30" # arm-allocation drift sweep — alerts after 3 sessions off target
  retail_pulse: "13:30"
  eod_prep: "15:45"
  close_debrief: "17:00"
  asia_watch: "22:00"
  weekend_dd: "Sat 09:00"

# ── Data sources (priority order) ────────────────────────────────
# Reality check 2026-05-15: only sources actually wired through clients
# in this repo. Aspirational sources (finnhub, fintel_scrape, sec_edgar,
# reddit_pushshift, stocktwits, finnhub_calendar) removed until a client
# exists. Add back only when an integration is in place.
data_sources:
  fundamentals: ["yfinance"]
  options_flow: ["unusual_whales", "yfinance"]
  news: ["google_cse", "yfinance"]
  technicals: ["yfinance"]
  macro: ["yfinance"]
  crypto: ["yfinance"]
  retail_sentiment: ["google_trends", "youtube"]
  llm_review: ["xai_grok", "google_gemini"]
  portfolio: ["ibkr", "moomoo"]
  aggregate: ["mission_control.collect_payload"]

# ── Second-opinion (advisory, never overrides gates) ─────────────
second_opinion:
  enabled: true
  model: "gemini-2.5-flash"

# ── Memory paths ─────────────────────────────────────────────────
memory:
  thesis_log: "agents/dfv/memory/thesis_log.json"
  conviction: "agents/dfv/memory/conviction.json"
  watchlist: "agents/dfv/memory/watchlist.json"
  postmortems: "agents/dfv/memory/postmortems.jsonl"
  daily_briefs: "agents/dfv/memory/briefs/"
  decisions_log: "agents/dfv/memory/decisions.jsonl"
  journal: "agents/dfv/memory/journal.jsonl"
  notifications: "agents/dfv/memory/notifications.jsonl"
  reconciliation: "agents/dfv/memory/reconciliation.json"

# ── Auto-skeleton guard (orphan-position prevention) ────────────
# When a position appears in any venue without a thesis, the daemon writes
# a TODO skeleton thesis (conviction=0, thesis="TODO", invalidation="TODO")
# and emits a notification so the operator can fill it in. Eliminates
# silent orphan positions.
orphan_guard:
  enabled: true
  scan_interval_seconds: 300 # 5 min
  notify_on_skeleton: true

# ── Position reconciler (per-venue drift detection) ─────────────
# Every N seconds the daemon snapshots positions from each venue connector
# and compares to mission_control.collect_payload(). Mismatches surface as
# a red banner in the dashboard and a notification.
reconciler:
  enabled: true
  scan_interval_seconds: 300 # 5 min
  notify_on_mismatch: true

# ── Live breach alerts (Telegram push via shared.alerter) ───────
breach_alerts:
  enabled: true
  push_via: ["telegram", "journal"] # journal = always; telegram = if configured
  dedupe_hours: 6

# ── Three-LLM jury (replaces single-Gemini second opinion) ──────
jury:
  enabled: true
  panelists: ["gemini", "grok", "openai"]
  quorum: 2 # need this many panelists responding to count
  models:
    gemini: "gemini-2.5-flash"
    grok: "grok-3-mini"
    openai: "gpt-4o-mini"

# ── Hard rules (will not be overridden) ──────────────────────────
hard_rules:
  - "No position without a written thesis."
  - "No size above the conviction tier."
  - "No exit without referencing the thesis."
  - "No trade I can't explain on a whiteboard in 60 seconds."
  - "No trade because of FOMO."
  - "Cash is a position. Dry powder is sacred."
  - "No trade that risks irrationality eating my solvency."
  - "If I can't say 'I like the stock' in plain English, I don't own it."

# ── Allocation arms (war room rotation targets) ─────────────────
# Targets mirror divisions/trading/warroom/engine.py::ArmAllocation
# tuples so drift_monitor can compare actual vs target without coupling
# to that module. Update both places when re-balancing.
allocation_arms:
  iran_oil:       { target_pct: 30, limit_pct: 35 }
  bdc_credit:     { target_pct: 25, limit_pct: 30 }
  crypto_metals:  { target_pct: 20, limit_pct: 25 }
  defi_yield:     { target_pct: 15, limit_pct: 20 }
  tradfi_rotate:  { target_pct: 10, limit_pct: 15 }

# ── Drift monitor ───────────────────────────────────────────────
# Trips a notification when an arm's actual allocation is >threshold_pct
# off target for sessions_required consecutive sessions. Designed to
# catch slow capital migration before it becomes a regret-the-bottom
# rebalance. State persisted at agents/dfv/memory/drift_state.json.
drift_monitor:
  enabled: true
  threshold_pct: 5.0   # absolute drift band (target ±5pp)
  sessions_required: 3 # consecutive midday snapshots off-target
  notify_severity: "warn"
  source: "mission_control.collect_payload().war_room.arms"

# ── Screener-driven watchlist ───────────────────────────────────
# EOD pulls top-N candidates per screener into agents/dfv/memory/watchlist.json,
# replacing prior contents. Each entry carries its score + screener tag
# so the brief can rank tomorrow's homework deterministically.
screeners:
  enabled: true
  top_n_per_screen: 5
  total_cap: 15
  active:
    - bdc_stress     # NAV discount + non-accrual cluster
    - oil_geopolitical # XLE/Brent regime + Iran/OPEC headline
    - vol_squeeze    # IV rank + dealer GEX wall proximity

# ── Weekend DD writer (Saturday 09:00) ──────────────────────────
# For every thesis with conviction >= min_conviction, writes a fresh
# markdown DD under agents/dfv/memory/dd/{SYMBOL}_dd.md. Idempotent
# (overwrites each Saturday). Catches stale theses and forces a
# 60-second whiteboard restatement.
weekend_dd:
  enabled: true
  min_conviction: 3
  out_dir: "agents/dfv/memory/dd"
  include_sections:
    - thesis_snapshot
    - catalysts_and_invalidation
    - position_and_pnl
    - exit_ladder
    - what_would_change_my_mind
